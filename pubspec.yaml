name: food_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  intl: ^0.20.2
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  carousel_slider: ^5.1.2
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# KONFIGURASI ICON APLIKASI
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"

# KONFIGURASI SPLASH SCREEN (INI YANG BARU)
flutter_native_splash:
  color: "#ffffff" # Warna background putih, bisa ganti ke #43A047 kalau mau hijau
  image: "assets/images/app_icon.png" # Logo yang muncul di tengah
  android_12:
    image: "assets/images/app_icon.png"
    color: "#ffffff"
  fullscreen: true